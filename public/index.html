<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ROP · Live</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a0f1c'/%3E%3Ctext x='50%25' y='58%25' text-anchor='middle' font-family='monospace' font-weight='700' font-size='28' fill='%237aa2ff'%3ER%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=27" />
    <!-- Discourage TV/console browsers from caching aggressively. These hints
         are non-binding but most browsers honor them on first load. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
  </head>
  <body>
    <canvas id="bg"></canvas>

    <div id="settingsDock" class="settings-dock">
    <button
      id="settingsBtn"
      class="settings-btn"
      type="button"
      tabindex="0"
      aria-label="Settings"
      aria-expanded="false"
      aria-controls="settingsPanel"
    >
      <svg class="settings-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path
          d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96a.488.488 0 0 0-.59.22L2.74 9.48a.492.492 0 0 0 .12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.03-1.58ZM12 15.6A3.6 3.6 0 1 1 15.6 12 3.6 3.6 0 0 1 12 15.6Z"
        />
      </svg>
    </button>

    <div id="settingsPanel" class="settings-panel hidden" role="dialog" aria-label="Settings" hidden>
      <label class="settings-row">
        <input type="checkbox" id="liteToggle" />
        <span class="settings-toggle-ui" aria-hidden="true"></span>
        <span class="settings-label">Performance mode</span>
      </label>
      <div class="settings-field">
        <label class="settings-field-label" for="newsCountSelect">News headlines</label>
        <select id="newsCountSelect" class="settings-select" aria-label="Number of news headlines">
          <option value="3">3</option>
          <option value="5">5</option>
          <option value="8">8</option>
          <option value="10">10</option>
          <option value="15">15</option>
        </select>
      </div>
      <label class="settings-row">
        <input type="checkbox" id="debugToggle" />
        <span class="settings-toggle-ui" aria-hidden="true"></span>
        <span class="settings-label">Debug panel</span>
      </label>
    </div>
    </div>

    <main class="stage">
      <!-- Top bar: weather (left) + ROP (center) + clock (right) -->
      <header class="top">
        <div class="weather">
          <div id="wxIcon" class="wx-icon">·</div>
          <div class="wx-text">
            <div id="wxTemp" class="wx-temp">—°</div>
            <div id="wxDesc" class="wx-desc">Denver weather…</div>
          </div>
        </div>
        <div class="top-brand">
          <div class="brand-main">ROP</div>
          <div class="brand-sub">
            <span id="marketStateDot" class="state-dot"></span>
            <span id="marketState">Market Open</span>
          </div>
        </div>
        <div class="clock">
          <div class="clock-time">
            <span id="time">--:--</span>
            <span id="ampm" class="clock-ampm">--</span>
          </div>
          <div class="clock-meta">
            <span id="date">--</span>
            <span class="dot">·</span>
            <span>Denver, CO</span>
          </div>
        </div>
      </header>

      <!-- Center: price, change, chart -->
      <section class="hero">
        <div id="price" class="price">—</div>
        <div class="change-row">
          <span id="changeArrow" class="arrow">·</span>
          <span id="change" class="change">—</span>
          <span id="changePct" class="change-pct">—</span>
        </div>
        <canvas id="spark" class="spark"></canvas>
      </section>
    </main>

    <footer class="ticker">
      <div class="ticker-tag">NEWS</div>
      <div class="ticker-viewport">
        <div class="ticker-track" id="tickerTrack"></div>
      </div>
    </footer>

    <div id="diag" class="diag hidden"></div>

    <script src="./config.js?v=27"></script>
    <script src="./app.js?v=27" defer></script>
  </body>
</html>
